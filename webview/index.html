<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeRefactor AI</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e1e; color: #d4d4d4; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 250px; background: #252526; border-right: 1px solid #3c3c3c; padding: 10px; }
        .main { flex: 1; padding: 20px; overflow: auto; }
        h1 { font-size: 18px; margin-bottom: 15px; color: #569cd6; }
        h2 { font-size: 14px; margin: 15px 0 10px; color: #4ec9b0; }
        .btn { background: #0e639c; color: white; border: none; padding: 8px 16px; cursor: pointer; border-radius: 2px; margin: 5px 0; }
        .btn:hover { background: #1177bb; }
        .metric { display: inline-block; margin: 10px 15px; padding: 10px 15px; background: #2d2d2d; border-radius: 4px; }
        .metric-value { font-size: 24px; font-weight: bold; color: #569cd6; }
        .metric-label { font-size: 12px; color: #808080; }
        .smell { padding: 8px 12px; margin: 5px 0; background: #3c1f1f; border-left: 3px solid #f14c4c; border-radius: 2px; }
        .smell.high { border-color: #f14c4c; }
        .smell.medium { border-color: #cca700; }
        .smell.low { border-color: #cca700; }
        .graph-container { width: 100%; height: 400px; border: 1px solid #3c3c3c; background: #1e1e1e; }
        #graph { width: 100%; height: 100%; }
        .node circle { fill: #4ec9b0; stroke: #fff; stroke-width: 2px; }
        .node text { fill: #d4d4d4; font-size: 12px; }
        .link { stroke: #6a9955; stroke-opacity: 0.6; stroke-width: 1.5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>CodeRefactor AI</h1>
            <button class="btn" onclick="analyze()">Analyze</button>
            <button class="btn" onclick="rewrite()">AI Rewrite</button>
            <button class="btn" onclick="visualize()">Graph</button>
            <hr style="border-color: #3c3c3c; margin: 15px 0;">
            <div id="stats"></div>
        </div>
        <div class="main">
            <div id="metrics"></div>
            <h2>Code Smells</h2>
            <div id="smells"></div>
            <h2>Dependency Graph</h2>
            <div class="graph-container">
                <div id="graph"></div>
            </div>
        </div>
    </div>
    
    <script>
        // D3.js Force Graph
        function renderGraph(data) {
            const container = document.getElementById('graph');
            container.innerHTML = '';
            
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            const svg = d3.select('#graph')
                .append('svg')
                .attr('width', width)
                .attr('height', height);
            
            const simulation = d3.forceSimulation(data.nodes)
                .force('link', d3.forceLink(data.links).id(d => d.id).distance(100))
                .force('charge', d3.forceManyBody().strength(-300))
                .force('center', d3.forceCenter(width / 2, height / 2));
            
            const link = svg.append('g')
                .selectAll('line')
                .data(data.links)
                .enter()
                .append('line')
                .attr('class', 'link');
            
            const node = svg.append('g')
                .selectAll('g')
                .data(data.nodes)
                .enter()
                .append('g')
                .attr('class', 'node')
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended));
            
            node.append('circle')
                .attr('r', 15);
            
            node.append('text')
                .attr('dx', 20)
                .attr('dy', 5)
                .text(d => d.label);
            
            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);
                
                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });
            
            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }
            
            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }
            
            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }
        }
        
        // VSCode communication
        const vscode = acquireVsCodeApi();
        
        function analyze() {
            vscode.postMessage({ command: 'analyze' });
        }
        
        function rewrite() {
            vscode.postMessage({ command: 'rewrite' });
        }
        
        function visualize() {
            vscode.postMessage({ command: 'visualize' });
        }
        
        // Listen for messages from extension
        window.addEventListener('message', event => {
            const data = event.data;
            if (data.type === 'analysis') {
                document.getElementById('metrics').innerHTML = `
                    <div class="metric">
                        <div class="metric-value">${data.complexity}</div>
                        <div class="metric-label">Complexity</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value">${data.smells.length}</div>
                        <div class="metric-label">Smells</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value">${data.dependencies.length}</div>
                        <div class="metric-label">Dependencies</div>
                    </div>
                `;
                
                document.getElementById('smells').innerHTML = data.smells.map(s => 
                    `<div class="smell ${s.severity}">${s.type}: ${s.message}</div>`
                ).join('');
            }
            
            if (data.type === 'graph') {
                renderGraph(data);
            }
        });
    </script>
</body>
</html>
